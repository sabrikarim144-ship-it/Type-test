<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Master - Révision ISTQB Complète</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --dark-bg: #0a0b10;
            --card-bg: #161b22;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e6edf3;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 1000px; width: 100%; }

        h1 { text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 10px; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 30px; font-style: italic; }

        h2 { color: var(--neon-purple); border-left: 4px solid var(--neon-purple); padding-left: 15px; margin: 30px 0 15px 0; font-size: 1.2rem; text-transform: uppercase; }

        /* --- BOUTONS --- */
        .test-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }

        .test-btn {
            background: var(--card-bg);
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .test-btn:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            transform: translateY(-2px);
        }

        #display-zone {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--neon-blue);
            padding: 20px;
            border-radius: 8px;
            min-height: 140px;
            margin-bottom: 40px;
        }

        .info-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-right: 10px;
            text-transform: uppercase;
        }
        .tag-box { background: #444; color: white; }
        .tag-actor { background: var(--neon-purple); color: white; }

        /* --- QUIZ --- */
        .quiz-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #30363d;
        }

        .option {
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }

        .option:hover { border-color: var(--neon-blue); }
        .correct { background: var(--neon-green) !important; color: black; font-weight: bold; }
        .wrong { background: var(--neon-red) !important; color: white; }

        .progress-bar { height: 6px; background: #21262d; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--neon-blue); transition: 0.4s; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 QA Ultra-Dashboard</h1>
    <p class="subtitle">Révision complète : Niveaux, Types & Méthodologies</p>

    <h2>1. Niveaux de Tests (ISTQB)</h2>
    <div class="test-selector">
        <button class="test-btn" onclick="showInfo('composant')">Composant</button>
        <button class="test-btn" onclick="showInfo('int_composant')">Intégration Composant</button>
        <button class="test-btn" onclick="showInfo('système')">Système</button>
        <button class="test-btn" onclick="showInfo('int_système')">Intégration Système</button>
        <button class="test-btn" onclick="showInfo('acceptation')">Acceptation</button>
    </div>

    <h2>2. Types & Maintenance</h2>
    <div class="test-selector">
        <button class="test-btn" style="border-color: var(--neon-green)" onclick="showInfo('fonctionnel')">Fonctionnel (Quoi)</button>
        <button class="test-btn" style="border-color: var(--neon-red)" onclick="showInfo('non_fonctionnel')">Non-Fonctionnel (Comment)</button>
        <button class="test-btn" onclick="showInfo('regression')">Régression / Confirmation</button>
    </div>

    <div id="display-zone">
        <h3 style="color: var(--neon-blue); margin-top:0;">Mode Révision Activé</h3>
        <p>Sélectionne un bouton pour explorer les détails techniques, l'acteur et la méthodologie (Boîte Noire/Blanche).</p>
    </div>

    <h2>3. Challenge Quiz</h2>
    <div class="quiz-card">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="quiz-content">
            <h3 id="question" style="margin-top:0;">Prêt ?</h3>
            <div id="options"></div>
        </div>
        <div id="score-text" style="text-align:center; margin-top:15px; font-size: 0.9rem;"></div>
    </div>
</div>

<script>
    const infoData = {
        composant: { 
            t: "Test de Composant", b: "Boîte Blanche", a: "Développeur",
            d: "Vérifie les plus petites unités de code (fonctions, classes). On regarde l'intérieur du code." 
        },
        int_composant: { 
            t: "Intégration de Composants", b: "Boîte Blanche / Grise", a: "Développeur / Testeur",
            d: "Vérifie les échanges entre modules internes du même logiciel." 
        },
        système: { 
            t: "Test Système", b: "Boîte Noire", a: "Testeur QA",
            d: "Vérifie le logiciel complet par rapport aux spécifications fonctionnelles." 
        },
        int_système: { 
            t: "Intégration de Système (SIT)", b: "Boîte Noire", a: "Testeur QA / DevOps",
            d: "Vérifie la communication entre ton logiciel et les systèmes externes (APIs, ERP)." 
        },
        acceptation: { 
            t: "Test d'Acceptation", b: "Boîte Noire", a: "Client / Utilisateur",
            d: "Validation finale du métier pour décider de la mise en production." 
        },
        fonctionnel: { 
            t: "Test Fonctionnel", b: "Boîte Noire", a: "Testeur QA / Analyste",
            d: "Vérifie <strong>ce que fait</strong> le logiciel. Ex: 'Le bouton enregistrer fonctionne-t-il ?'" 
        },
        non_fonctionnel: { 
            t: "Test Non-Fonctionnel", b: "Boîte Noire", a: "Expert Performance / Sécurité",
            d: "Vérifie <strong>comment</strong> le logiciel se comporte. Ex: Charge, Sécurité, UX, Rapidité." 
        },
        regression: { 
            t: "Régression vs Confirmation", b: "Mixte", a: "Testeur QA",
            d: "Confirmation : Le bug est-il réparé ? <br>Régression : Est-ce qu'on a cassé le reste en réparant ?" 
        }
    };

    function showInfo(id) {
        const item = infoData[id];
        const zone = document.getElementById('display-zone');
        zone.innerHTML = `
            <h3 style="color: var(--neon-blue); margin-top:0;">${item.t}</h3>
            <div>
                <span class="info-tag tag-box">⬛ ${item.b}</span>
                <span class="info-tag tag-actor">👤 ${item.a}</span>
            </div>
            <p style="margin-top:15px;">${item.d}</p>
        `;
    }

    const quizData = [
        { q: "Qui réalise principalement les tests d'Acceptation ?", o: ["Le Développeur", "Le Client / Utilisateur", "Le DevOps"], a: 1 },
        { q: "Le test de Composant est généralement de quel type ?", o: ["Boîte Noire", "Boîte Blanche"], a: 1 },
        { q: "Un test de performance (temps de charge) est un test :", o: ["Fonctionnel", "Non-Fonctionnel"], a: 1 },
        { q: "Vérifier la communication avec un ERP externe est un test de :", o: ["Composant", "Intégration Système (SIT)", "Système"], a: 1 },
        { q: "Je vérifie que le code interne respecte la logique. Je suis :", o: ["Le Développeur (Boîte Blanche)", "Le Client (Boîte Noire)"], a: 0 },
        { q: "Vérifier si le bouton 'Payer' effectue l'action attendue est un test :", o: ["Fonctionnel", "Non-Fonctionnel"], a: 0 }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuiz() {
        if (currentQ >= quizData.length) {
            document.getElementById('quiz-content').innerHTML = `<h2>🏁 Score : ${score}/${quizData.length}</h2><button class="test-btn" style="width:100%" onclick="location.reload()">Recommencer</button>`;
            return;
        }
        const data = quizData[currentQ];
        document.getElementById('question').innerText = data.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        document.getElementById('progress-fill').style.width = `${(currentQ / quizData.length) * 100}%`;

        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = document.querySelectorAll('.option');
                btns.forEach(b => b.disabled = true);
                if (i === data.a) { btn.classList.add('correct'); score++; }
                else { btn.classList.add('wrong'); btns[data.a].classList.add('correct'); }
                setTimeout(() => { currentQ++; loadQuiz(); }, 1500);
            };
            optionsDiv.appendChild(btn);
        });
    }

    loadQuiz();
</script>

</body>
</html>
