<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Ninja Dashboard</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --dark-bg: #0a0b10;
            --card-bg: #161b22;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: #e6edf3;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 900px; width: 100%; }

        h1 { text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 40px; }

        /* --- SECTION INTERACTIVE --- */
        .test-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }

        .test-btn {
            background: var(--card-bg);
            border: 1px solid var(--neon-purple);
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .test-btn:hover {
            box-shadow: 0 0 15px var(--neon-purple);
            transform: scale(1.05);
        }

        #display-zone {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--neon-blue);
            padding: 20px;
            border-radius: 0 15px 15px 0;
            min-height: 120px;
            margin-bottom: 50px;
            animation: fadeIn 0.5s;
        }

        /* --- QUIZ DESIGN --- */
        .quiz-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .option {
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-size: 1rem;
        }

        .option:hover { background: #30363d; border-color: var(--neon-blue); }
        .correct { background: var(--neon-green) !important; color: black; font-weight: bold; }
        .wrong { background: var(--neon-red) !important; color: white; }

        .progress-bar {
            height: 10px; background: #21262d;
            border-radius: 5px; margin-bottom: 20px; overflow: hidden;
        }
        #progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            transition: 0.4s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ QA Master Dashboard</h1>

    <div class="test-selector">
        <button class="test-btn" onclick="showInfo('unitaire')">Unit (TU)</button>
        <button class="test-btn" onclick="showInfo('integration')">Intégration</button>
        <button class="test-btn" onclick="showInfo('sit')">SIT</button>
        <button class="test-btn" onclick="showInfo('systeme')">Système</button>
        <button class="test-btn" onclick="showInfo('uat')">UAT</button>
        <button class="test-btn" onclick="showInfo('regression')">Régression</button>
    </div>

    <div id="display-zone">
        <h3 style="color: var(--neon-blue);">Clique sur un test ci-dessus pour voir l'explication...</h3>
    </div>

    <div class="quiz-card">
        <h2 style="text-align: center; color: var(--neon-purple);">🧠 Ultimate QA Quiz</h2>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="quiz-content">
            <h3 id="question">Prêt à tester tes connaissances ?</h3>
            <div id="options"></div>
        </div>
        <div id="result" style="text-align: center; margin-top: 20px; font-weight: bold;"></div>
    </div>
</div>

<script>
    // DONNÉES DES EXPLICATIONS
    const infoData = {
        unitaire: { t: "Test Unitaire (Boîte Blanche)", d: "On teste une petite brique de code seule. Fait par le dév pour s'assurer que sa logique est correcte." },
        integration: { t: "Test d'Intégration", d: "On vérifie si deux modules du même logiciel s'emboîtent bien et échangent les bonnes données." },
        sit: { t: "System Integration Test", d: "Test des flux avec l'extérieur (ex: envoyer une commande à l'API de livraison)." },
        systeme: { t: "Test Système (Boîte Noire)", d: "Vérification technique complète de l'appli de bout-en-bout." },
        uat: { t: "User Acceptance Test", d: "Le client teste si le logiciel répond à ses besoins métiers. Étape finale avant la prod." },
        regression: { t: "Régression vs Confirmation", d: "Confirmation = le bug est-il corrigé ? Régression = Est-ce qu'on a cassé le reste en réparant le bug ?" }
    };

    function showInfo(id) {
        const zone = document.getElementById('display-zone');
        zone.style.animation = 'none';
        zone.offsetHeight; // Trigger reflow
        zone.style.animation = 'fadeIn 0.5s';
        zone.innerHTML = `<h3 style="color: var(--neon-blue);">${infoData[id].t}</h3><p>${infoData[id].d}</p>`;
    }

    // DONNÉES DU QUIZ
    const quizData = [
        { q: "Quel test vérifie qu'une correction n'a pas créé de nouveaux bugs ?", o: ["Test de Confirmation", "Test de Régression", "Test Unitaire"], a: 1 },
        { q: "En test 'Boîte Blanche', on teste quoi ?", o: ["L'interface graphique", "Le code et sa logique", "Le besoin client"], a: 1 },
        { q: "Quel est l'ordre logique des tests ?", o: ["UAT -> Système -> TU", "TU -> Intégration -> Système -> UAT", "Système -> TU -> SIT"], a: 1 },
        { q: "Le test SIT se concentre sur quoi ?", o: ["Les boucles IF/ELSE", "Les interfaces avec des systèmes tiers", "La couleur des boutons"], a: 1 },
        { q: "Qui réalise généralement l'UAT ?", o: ["Le développeur", "L'utilisateur final / Le client", "Le robot de test"], a: 1 }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuiz() {
        if (currentQ >= quizData.length) {
            document.getElementById('quiz-content').innerHTML = `<h2>🏁 Terminé ! Score : ${score}/${quizData.length}</h2><button class="test-btn" onclick="location.reload()">Rejouer</button>`;
            return;
        }

        const data = quizData[currentQ];
        document.getElementById('question').innerText = data.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        document.getElementById('progress-fill').style.width = `${(currentQ / quizData.length) * 100}%`;

        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkQuiz(i, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkQuiz(index, btn) {
        const correct = quizData[currentQ].a;
        const allBtns = document.querySelectorAll('.option');
        allBtns.forEach(b => b.disabled = true);

        if (index === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
        }

        setTimeout(() => {
            currentQ++;
            loadQuiz();
        }, 1500);
    }

    loadQuiz();
</script>

</body>
</html>
