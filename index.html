<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Simulator - Auto-Restart Edition</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --dark-bg: #0a0b10;
            --card-bg: #161b22;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e6edf3;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { 
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 40px; /* Espace fixe entre révision et quiz */
        }

        h1 { text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        h2 { color: var(--neon-purple); border-left: 4px solid var(--neon-purple); padding-left: 15px; margin-bottom: 15px; font-size: 1.1rem; }

        /* --- SECTION REVISION --- */
        .section-revision {
            width: 100%;
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 12px;
        }

        .test-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .test-btn {
            background: var(--card-bg);
            border: 1px solid #30363d;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .test-btn:hover { border-color: var(--neon-blue); }

        #display-zone {
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
            min-height: 100px;
        }

        /* --- SECTION QUIZ --- */
        .section-quiz {
            width: 100%;
            padding: 25px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid #30363d;
        }

        .quiz-header { display: flex; justify-content: space-between; color: var(--neon-blue); font-size: 0.9rem; margin-bottom: 10px; }

        .progress-bar { height: 6px; background: #21262d; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--neon-blue); transition: 0.4s; }

        .option {
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            display: block;
        }

        .correct { background: var(--neon-green) !important; color: black; font-weight: bold; }
        .wrong { background: var(--neon-red) !important; color: white; }

        .info-tag { font-size: 0.7rem; padding: 2px 6px; background: var(--neon-purple); border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 QA Simulator Pro</h1>

    <div class="section-revision">
        <h2>1. Fiches de Révision</h2>
        <div class="test-selector">
            <button class="test-btn" onclick="showInfo('composant')">Composant</button>
            <button class="test-btn" onclick="showInfo('système')">Système</button>
            <button class="test-btn" onclick="showInfo('acceptation')">Acceptation</button>
            <button class="test-btn" onclick="showInfo('sit')">SIT</button>
            <button class="test-btn" onclick="showInfo('fonc')">Fonctionnel</button>
            <button class="test-btn" onclick="showInfo('nonfonc')">Non-Fonc.</button>
        </div>
        <div id="display-zone">
            <p style="color: #8b949e;">Clique sur un bouton pour réviser.</p>
        </div>
    </div>

    <div class="section-quiz">
        <div class="quiz-header">
            <span id="question-number">Question 1/10</span>
            <span id="current-score">Score: 0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="quiz-content">
            <h3 id="question" style="margin: 0 0 20px 0;">Chargement du quiz...</h3>
            <div id="options"></div>
        </div>
    </div>
</div>

<script>
    const infoData = {
        composant: { t: "Test de Composant", b: "Boîte Blanche", a: "Développeur", d: "Vérifie les unités de code isolées (fonctions/classes)." },
        système: { t: "Test Système", b: "Boîte Noire", a: "Testeur QA", d: "Vérifie l'ensemble de l'appli selon les spécifications." },
        acceptation: { t: "Test d'Acceptation", b: "Boîte Noire", a: "Client", d: "Validation finale avant mise en production." },
        sit: { t: "Intégration Système (SIT)", b: "Boîte Noire", a: "DevOps/QA", d: "Vérifie les flux avec les systèmes externes (ERP/APIs)." },
        fonc: { t: "Test Fonctionnel", b: "Boîte Noire", a: "Testeur", d: "Teste 'Quoi' : Les actions (ex: le bouton enregistre bien)." },
        nonfonc: { t: "Test Non-Fonctionnel", b: "Boîte Noire", a: "Expert", d: "Teste 'Comment' : Performance, Sécurité, Rapidité." }
    };

    function showInfo(id) {
        const item = infoData[id];
        document.getElementById('display-zone').innerHTML = `
            <h3 style="color: var(--neon-blue); margin:0 0 5px 0;">${item.t}</h3>
            <span class="info-tag">${item.b}</span><span class="info-tag" style="background:#444;">${item.a}</span>
            <p style="margin-top:10px; font-size:0.9rem;">${item.d}</p>`;
    }

    const masterBank = [
        { q: "Qui fait les tests de Composant ?", o: ["Client", "Développeur", "Testeur"], a: 1 },
        { q: "Le test système est un test de type...", o: ["Boîte Blanche", "Boîte Noire"], a: 1 },
        { q: "Vérifier la rapidité est un test...", o: ["Fonctionnel", "Non-Fonctionnel"], a: 1 },
        { q: "L'UAT est validé par...", o: ["Le Développeur", "Le Client final"], a: 1 },
        { q: "Le test SIT vérifie la connexion avec...", o: ["Le code interne", "Les systèmes externes (ERP)"], a: 1 },
        { q: "Vérifier qu'une correction n'a rien cassé ailleurs :", o: ["Confirmation", "Régression"], a: 1 },
        { q: "Vérifier qu'un bug spécifique a disparu :", o: ["Confirmation", "Régression"], a: 0 },
        { q: "Le test unitaire étudie le code interne, c'est de la...", o: ["Boîte Noire", "Boîte Blanche"], a: 1 },
        { q: "Tester si le calcul de TVA est juste est un test...", o: ["Fonctionnel", "Non-Fonctionnel"], a: 0 },
        { q: "Le test d'Acceptation a lieu...", o: ["Au début", "À la fin, avant la prod"], a: 1 }
    ];

    let sessionQuestions = [];
    let currentQ = 0;
    let score = 0;

    function initQuiz() {
        sessionQuestions = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, 10);
        currentQ = 0; score = 0;
        loadQuiz();
    }

    function loadQuiz() {
        const content = document.getElementById('quiz-content');
        
        if (currentQ >= sessionQuestions.length) {
            content.innerHTML = `
                <h2 style="color:var(--neon-green); text-align:center;">🏆 Terminé ! Score : ${score}/10</h2>
                <p style="text-align:center; color:#8b949e;">Nouveau quiz aléatoire dans 5 secondes...</p>
                <button class="test-btn" style="width:100%; margin-top:10px;" onclick="initQuiz()">Lancer maintenant</button>`;
            
            // RELANCE AUTOMATIQUE APRÈS 5 SECONDES
            setTimeout(initQuiz, 5000);
            return;
        }

        const data = sessionQuestions[currentQ];
        document.getElementById('question-number').innerText = `Question ${currentQ + 1}/10`;
        document.getElementById('current-score').innerText = `Score: ${score}`;
        document.getElementById('progress-fill').style.width = `${(currentQ / 10) * 100}%`;
        
        content.innerHTML = `<h3 id="question" style="margin-bottom: 20px;">${data.q}</h3><div id="options"></div>`;
        const optionsDiv = document.getElementById('options');
        
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = document.querySelectorAll('.option');
                btns.forEach(b => b.disabled = true);
                if (i === data.a) { btn.classList.add('correct'); score++; }
                else { btn.classList.add('wrong'); btns[data.a].classList.add('correct'); }
                setTimeout(() => { currentQ++; loadQuiz(); }, 1200);
            };
            optionsDiv.appendChild(btn);
        });
    }

    initQuiz();
</script>
</body>
</html>
