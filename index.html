<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Master - Révision ISTQB</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --dark-bg: #0a0b10;
            --card-bg: #161b22;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e6edf3;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 900px; width: 100%; }

        h1 { text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 20px; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 40px; font-style: italic; }

        /* --- BOUTONS DE NAVIGATION --- */
        .test-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }

        .test-btn {
            background: var(--card-bg);
            border: 1px solid var(--neon-purple);
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .test-btn:hover {
            box-shadow: 0 0 15px var(--neon-purple);
            transform: translateY(-3px);
            background: #1c2128;
        }

        #display-zone {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--neon-blue);
            padding: 25px;
            border-radius: 0 15px 15px 0;
            min-height: 150px;
            margin-bottom: 50px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- QUIZ DESIGN --- */
        .quiz-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .option {
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-size: 1rem;
            transition: 0.2s;
        }

        .option:hover { border-color: var(--neon-blue); background: #30363d; }
        .correct { background: var(--neon-green) !important; color: black; font-weight: bold; border-color: var(--neon-green); }
        .wrong { background: var(--neon-red) !important; color: white; border-color: var(--neon-red); }

        .progress-bar {
            height: 8px; background: #21262d;
            border-radius: 4px; margin-bottom: 20px; overflow: hidden;
        }
        #progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            transition: 0.4s;
        }

        h2 { color: var(--neon-purple); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ QA Master : Niveaux de Tests</h1>
    <p class="subtitle">Révision basée sur ton cours d'hier (ISTQB Standard)</p>

    <div class="test-selector">
        <button class="test-btn" onclick="showInfo('composant')">1. Composant</button>
        <button class="test-btn" onclick="showInfo('int_composant')">2. Intégration Composant</button>
        <button class="test-btn" onclick="showInfo('système')">3. Système</button>
        <button class="test-btn" onclick="showInfo('int_système')">4. Intégration Système</button>
        <button class="test-btn" onclick="showInfo('acceptation')">5. Acceptation</button>
    </div>

    <div id="display-zone">
        <h3 style="color: var(--neon-blue); margin-top:0;">Prêt pour la révision ?</h3>
        <p>Clique sur un bouton pour afficher l'explication détaillée de chaque niveau de test vus en cours.</p>
    </div>

    <div class="quiz-card">
        <h2>🧠 Quiz de Validation</h2>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="quiz-content">
            <h3 id="question">Chargement...</h3>
            <div id="options"></div>
        </div>
        <div id="score-text" style="text-align:center; margin-top:15px; color: var(--neon-blue);"></div>
    </div>
</div>

<script>
    // DONNÉES MISES À JOUR SELON TON COURS
    const infoData = {
        composant: { 
            t: "Test de Composant (ou Unitaire)", 
            d: "Vérifie chaque module ou unité de code de manière isolée. C'est la base de la pyramide. <br><strong>Focus :</strong> Logique interne, algorithmes." 
        },
        int_composant: { 
            t: "Intégration de Composants", 
            d: "Vérifie les interactions et interfaces entre les modules internes d'un même système après leurs tests individuels. <br><strong>Focus :</strong> Passage de données entre modules." 
        },
        système: { 
            t: "Test Système", 
            d: "Vérifie l'ensemble du système complet par rapport aux spécifications. On teste l'appli comme un tout. <br><strong>Focus :</strong> Besoins fonctionnels et non-fonctionnels." 
        },
        int_système: { 
            t: "Intégration de Système (SIT)", 
            d: "Vérifie les interactions entre ton système et des systèmes externes (APIs, ERP, autres logiciels de l'entreprise). <br><strong>Focus :</strong> Flux de données externes." 
        },
        acceptation: { 
            t: "Test d'Acceptation (UAT)", 
            d: "Validation finale par les utilisateurs ou le client pour confirmer que le système répond aux besoins métiers. <br><strong>Focus :</strong> Confiance du client, Go/No-Go." 
        }
    };

    function showInfo(id) {
        const zone = document.getElementById('display-zone');
        zone.innerHTML = `<h3 style="color: var(--neon-blue); margin-top:0;">${infoData[id].t}</h3><p>${infoData[id].d}</p>`;
    }

    // QUIZ GLOBAL MIS À JOUR
    const quizData = [
        { q: "L'Intégration de Système (SIT) vérifie principalement quoi ?", o: ["Les fonctions isolées", "Les liens avec des systèmes externes (ex: ERP)", "L'interface utilisateur"], a: 1 },
        { q: "Quel test se fait sur une brique de code isolée (classe ou fonction) ?", o: ["Test Système", "Acceptation", "Test de Composant"], a: 2 },
        { q: "L'Intégration de Composants vérifie les échanges entre quoi ?", o: ["L'appli et la banque", "Les modules internes du code", "Le client et le dev"], a: 1 },
        { q: "Quel est le dernier niveau de test avant la mise en production ?", o: ["Test Système", "Test d'Acceptation", "Intégration Composant"], a: 1 },
        { q: "Le test Système est généralement un test de type :", o: ["Boîte Blanche", "Boîte Noire"], a: 1 }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuiz() {
        if (currentQ >= quizData.length) {
            document.getElementById('quiz-content').innerHTML = `<h2 style="color:var(--neon-green)">🏁 Score final : ${score}/${quizData.length}</h2><button class="test-btn" style="width:100%" onclick="location.reload()">Recommencer</button>`;
            return;
        }

        const data = quizData[currentQ];
        document.getElementById('question').innerText = data.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        document.getElementById('progress-fill').style.width = `${(currentQ / quizData.length) * 100}%`;

        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkQuiz(i, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkQuiz(index, btn) {
        const correct = quizData[currentQ].a;
        const allBtns = document.querySelectorAll('.option');
        allBtns.forEach(b => b.disabled = true);

        if (index === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            allBtns[correct].classList.add('correct');
        }

        setTimeout(() => {
            currentQ++;
            loadQuiz();
        }, 1500);
    }

    loadQuiz();
</script>

</body>
</html>
