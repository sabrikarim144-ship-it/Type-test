<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Simulator - Fix Final</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --dark-bg: #0a0b10;
            --card-bg: #161b22;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: #e6edf3;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 30px; }

        h1 { text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        h2 { color: var(--neon-purple); border-left: 4px solid var(--neon-purple); padding-left: 15px; margin-bottom: 15px; }

        .section-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; }

        .test-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }

        .test-btn {
            background: #21262d; border: 1px solid #30363d; color: white;
            padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .test-btn:hover { border-color: var(--neon-blue); }

        #display-zone { background: #0d1117; padding: 15px; border-radius: 8px; min-height: 80px; border: 1px dashed #30363d; }

        /* QUIZ */
        .quiz-card { position: relative; min-height: 300px; }
        .quiz-header { display: flex; justify-content: space-between; color: var(--neon-blue); margin-bottom: 10px; font-weight: bold; }
        .progress-bar { height: 6px; background: #21262d; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--neon-blue); transition: 0.4s; }

        .option {
            background: #21262d; border: 1px solid #30363d; color: white;
            padding: 15px; margin: 8px 0; border-radius: 8px; cursor: pointer; width: 100%; text-align: left;
        }
        .option:hover:not(:disabled) { border-color: var(--neon-blue); }
        .correct { background: var(--neon-green) !important; color: black; font-weight: bold; }
        .wrong { background: var(--neon-red) !important; color: white; }

        .hidden { display: none; }
        .info-tag { font-size: 0.7rem; padding: 2px 6px; background: var(--neon-purple); border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 QA Simulator Fix</h1>

    <div class="section-box">
        <h2>1. Fiches Mémo</h2>
        <div class="test-selector">
            <button class="test-btn" onclick="showInfo('composant')">Composant</button>
            <button class="test-btn" onclick="showInfo('système')">Système</button>
            <button class="test-btn" onclick="showInfo('acceptation')">Acceptation</button>
            <button class="test-btn" onclick="showInfo('sit')">SIT</button>
            <button class="test-btn" onclick="showInfo('fonc')">Fonctionnel</button>
        </div>
        <div id="display-zone">Clique sur un bouton pour réviser.</div>
    </div>

    <div class="section-box quiz-card">
        <div id="quiz-ui">
            <div class="quiz-header">
                <span id="q-num">Question 1/10</span>
                <span id="q-score">Score: 0</span>
            </div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <h3 id="question-text">Chargement...</h3>
            <div id="options-container"></div>
        </div>

        <div id="result-screen" class="hidden" style="text-align: center; padding: 40px 0;">
            <h2 id="final-status" style="border:none;">🏆 Terminé !</h2>
            <p id="final-score" style="font-size: 1.5rem; color: var(--neon-blue);"></p>
            <p>Nouveau quiz dans quelques secondes...</p>
            <button class="test-btn" style="width: 200px; margin-top: 20px; border-color: var(--neon-green);" onclick="initQuiz()">Recommencer Maintenant</button>
        </div>
    </div>
</div>

<script>
    const infoData = {
        composant: { t: "Test de Composant", b: "Boîte Blanche", a: "Développeur", d: "Vérifie les unités de code isolées (fonctions/classes)." },
        système: { t: "Test Système", b: "Boîte Noire", a: "Testeur QA", d: "Vérifie l'ensemble de l'appli selon les spécifications." },
        acceptation: { t: "Test d'Acceptation", b: "Boîte Noire", a: "Client", d: "Validation finale avant mise en production." },
        sit: { t: "Intégration Système (SIT)", b: "Boîte Noire", a: "DevOps/QA", d: "Vérifie les flux avec les systèmes externes (ERP/APIs)." },
        fonc: { t: "Test Fonctionnel", b: "Boîte Noire", a: "Testeur", d: "Teste 'Quoi' : Les actions (ex: le bouton enregistre bien)." }
    };

    function showInfo(id) {
        const item = infoData[id];
        document.getElementById('display-zone').innerHTML = `
            <h3 style="color: var(--neon-blue); margin:0;">${item.t}</h3>
            <span class="info-tag">${item.b}</span><span class="info-tag" style="background:#444;">${item.a}</span>
            <p style="margin-top:10px; font-size:0.9rem;">${item.d}</p>`;
    }

    const masterBank = [
        { q: "Qui fait les tests de Composant ?", o: ["Client", "Développeur", "Testeur"], a: 1 },
        { q: "Le test système est un test de type...", o: ["Boîte Blanche", "Boîte Noire"], a: 1 },
        { q: "Vérifier la rapidité est un test...", o: ["Fonctionnel", "Non-Fonctionnel"], a: 1 },
        { q: "L'UAT est validé par...", o: ["Le Développeur", "Le Client final"], a: 1 },
        { q: "Le test SIT vérifie la connexion avec...", o: ["Le code interne", "Les systèmes externes (ERP)"], a: 1 },
        { q: "Vérifier qu'une correction n'a rien cassé ailleurs :", o: ["Confirmation", "Régression"], a: 1 },
        { q: "Vérifier qu'un bug spécifique a disparu :", o: ["Confirmation", "Régression"], a: 0 },
        { q: "Le test unitaire étudie le code interne, c'est de la...", o: ["Boîte Noire", "Boîte Blanche"], a: 1 },
        { q: "Tester si le calcul de TVA est juste est un test...", o: ["Fonctionnel", "Non-Fonctionnel"], a: 0 },
        { q: "Le test d'Acceptation a lieu...", o: ["Au début", "À la fin, avant la prod"], a: 1 }
    ];

    let sessionQuestions = [];
    let currentQ = 0;
    let score = 0;
    let autoRestartTimer;

    function initQuiz() {
        clearTimeout(autoRestartTimer); // Annule le redémarrage auto si on clique manuellement
        document.getElementById('quiz-ui').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        
        sessionQuestions = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, 10);
        currentQ = 0; 
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQ >= sessionQuestions.length) {
            showResults();
            return;
        }

        const data = sessionQuestions[currentQ];
        document.getElementById('q-num').innerText = `Question ${currentQ + 1}/10`;
        document.getElementById('q-score').innerText = `Score: ${score}`;
        document.getElementById('progress-fill').style.width = `${(currentQ / 10) * 100}%`;
        document.getElementById('question-text').innerText = data.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = document.querySelectorAll('.option');
                btns.forEach(b => b.disabled = true);
                if (i === data.a) { btn.classList.add('correct'); score++; }
                else { btn.classList.add('wrong'); btns[data.a].classList.add('correct'); }
                setTimeout(() => { currentQ++; loadQuestion(); }, 1200);
            };
            container.appendChild(btn);
        });
    }

    function showResults() {
        document.getElementById('quiz-ui').classList.add('hidden');
        const screen = document.getElementById('result-screen');
        screen.classList.remove('hidden');
        document.getElementById('final-score').innerText = `Score Final : ${score} / 10`;
        
        // Relance auto dans 8 secondes
        autoRestartTimer = setTimeout(initQuiz, 8000);
    }

    initQuiz();
</script>
</body>
</html>
